name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: read

env:
  IMAGE_NAME: todo-api

jobs:
  build-and-deploy:
    name: 🚀 Build & Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
    
    - name: ⚙️ Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restaurar dependencias
      run: dotnet restore TodoApi.sln
    
    - name: 🔨 Compilar solución
      run: dotnet build TodoApi.sln --configuration Release --no-restore
    
    - name: 🧪 Ejecutar pruebas
      run: dotnet test TodoApi.sln --configuration Release --no-build --verbosity normal
    
    - name: 🔐 Login en Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: 🐳 Login en Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    
    - name: 📝 Extraer metadata de Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: 🏗️ Build y Push de imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: 🚀 Deploy a Azure Container Apps
      uses: azure/CLI@v2
      with:
        inlineScript: |
          az config set extension.use_dynamic_install=yes_without_prompt
          
          # Obtener la imagen más reciente (con tag latest)
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          
          echo "Desplegando imagen: $IMAGE"
          
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image $IMAGE \
            --set-env-vars \
              ASPNETCORE_ENVIRONMENT=Production
    
    - name: 📊 Obtener URL de la aplicación
      uses: azure/CLI@v2
      id: get-url
      with:
        inlineScript: |
          URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "✅ Aplicación desplegada en: https://$URL"
    
    - name: 🏥 Health Check
      run: |
        echo "Esperando 10 segundos para que la app esté lista..."
        sleep 10
        
        URL="${{ steps.get-url.outputs.url }}"
        echo "Verificando health check en: $URL/api/todo"
        
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/todo" || echo "000")
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Health check exitoso! (HTTP $HTTP_CODE)"
        else
          echo "⚠️ Health check retornó HTTP $HTTP_CODE (puede estar iniciando)"
        fi
    
    - name: 📢 Resumen de Deployment
      run: |
        echo "## 🚀 Deployment Exitoso" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **API desplegada correctamente**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔗 **URL**: ${{ steps.get-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Endpoints Disponibles" >> $GITHUB_STEP_SUMMARY
        echo "- \`GET  ${{ steps.get-url.outputs.url }}/api/todo\` - Listar tareas" >> $GITHUB_STEP_SUMMARY
        echo "- \`POST ${{ steps.get-url.outputs.url }}/api/todo\` - Crear tarea" >> $GITHUB_STEP_SUMMARY
        echo "- \`GET  ${{ steps.get-url.outputs.url }}/api/todo/{id}\` - Obtener tarea" >> $GITHUB_STEP_SUMMARY
        echo "- \`PUT  ${{ steps.get-url.outputs.url }}/api/todo/{id}\` - Actualizar tarea" >> $GITHUB_STEP_SUMMARY
        echo "- \`DELETE ${{ steps.get-url.outputs.url }}/api/todo/{id}\` - Eliminar tarea" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🐳 **Imagen**: \`${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
