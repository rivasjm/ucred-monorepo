# Workflow simple para principiantes
# Este es un ejemplo más básico y fácil de entender

name: Build and Test

on:
  push:
    branches: [ main ]
    paths:
      - 'ucred-dotnet-ui/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ucred-dotnet-ui/**'

defaults:
  run:
    working-directory: ucred-dotnet-ui

# Permisos necesarios
permissions:
  contents: read

jobs:
  build:
    name: Compilar y Probar - Calculadora UI
    runs-on: ubuntu-latest
    
    steps:
    - name: Descargar código
      uses: actions/checkout@v4
    
    - name: Instalar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restaurar paquetes
      run: dotnet restore CalculadoraDemo.sln
    
    - name: Compilar proyecto
      run: dotnet build CalculadoraDemo.sln --no-restore
    
    - name: Ejecutar pruebas
      run: dotnet test CalculadoraDemo.sln --no-build
