name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Se dispara con tags como v1.0.0, v2.1.3, etc.

defaults:
  run:
    working-directory: ucred-dotnet-ui

permissions:
  contents: write  # Necesario para crear releases

jobs:
  create-release:
    name: Crear Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - name: 📋 Obtener versión del tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: 🎉 Crear GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Calculadora v${{ steps.get_version.outputs.version }}
        body: |
          ## 🧮 Calculadora con Avalonia UI
          
          ### 📦 Descargas por Plataforma
          
          - **Windows x64**: `Calculadora-v${{ steps.get_version.outputs.version }}-win-x64.zip`
          - **macOS (Intel)**: `Calculadora-v${{ steps.get_version.outputs.version }}-osx-x64.zip`
          - **macOS (Apple Silicon)**: `Calculadora-v${{ steps.get_version.outputs.version }}-osx-arm64.zip`
          - **Linux x64**: `Calculadora-v${{ steps.get_version.outputs.version }}-linux-x64.zip`
          
          ### 📝 Instrucciones de Instalación
          
          1. Descarga el archivo para tu sistema operativo
          2. Descomprime el archivo ZIP
          3. Ejecuta el archivo `Calculadora` (Linux/macOS) o `Calculadora.exe` (Windows)
          
          ### ✨ Características
          
          - Operaciones básicas: suma, resta, multiplicación, división
          - Interfaz gráfica multiplataforma con Avalonia UI
          - Arquitectura MVVM
          - 41 tests automatizados
        draft: false
        prerelease: false

  build-windows:
    name: 🪟 Compilar para Windows
    needs: create-release
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
    
    - name: ⚙️ Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restaurar dependencias
      run: dotnet restore CalculadoraDemo.sln
    
    - name: 🔨 Publicar aplicación (win-x64)
      run: |
        dotnet publish src/Calculadora/Calculadora.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o publish/win-x64
    
    - name: 📦 Empaquetar binarios
      run: |
        Compress-Archive -Path publish/win-x64/* -DestinationPath Calculadora-v${{ needs.create-release.outputs.version }}-win-x64.zip
    
    - name: ⬆️ Subir artefacto a Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ucred-dotnet-ui/Calculadora-v${{ needs.create-release.outputs.version }}-win-x64.zip
        asset_name: Calculadora-v${{ needs.create-release.outputs.version }}-win-x64.zip
        asset_content_type: application/zip

  build-macos-intel:
    name: 🍎 Compilar para macOS (Intel)
    needs: create-release
    runs-on: macos-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
    
    - name: ⚙️ Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restaurar dependencias
      run: dotnet restore CalculadoraDemo.sln
    
    - name: 🔨 Publicar aplicación (osx-x64)
      run: |
        dotnet publish src/Calculadora/Calculadora.csproj \
          -c Release \
          -r osx-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=false \
          -o publish/osx-x64
    
    - name: 📦 Empaquetar binarios
      run: |
        cd publish/osx-x64
        chmod +x Calculadora
        zip -r ../../Calculadora-v${{ needs.create-release.outputs.version }}-osx-x64.zip *
    
    - name: ⬆️ Subir artefacto a Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ucred-dotnet-ui/Calculadora-v${{ needs.create-release.outputs.version }}-osx-x64.zip
        asset_name: Calculadora-v${{ needs.create-release.outputs.version }}-osx-x64.zip
        asset_content_type: application/zip

  build-macos-arm:
    name: 🍎 Compilar para macOS (Apple Silicon)
    needs: create-release
    runs-on: macos-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
    
    - name: ⚙️ Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restaurar dependencias
      run: dotnet restore CalculadoraDemo.sln
    
    - name: 🔨 Publicar aplicación (osx-arm64)
      run: |
        dotnet publish src/Calculadora/Calculadora.csproj \
          -c Release \
          -r osx-arm64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=false \
          -o publish/osx-arm64
    
    - name: 📦 Empaquetar binarios
      run: |
        cd publish/osx-arm64
        chmod +x Calculadora
        zip -r ../../Calculadora-v${{ needs.create-release.outputs.version }}-osx-arm64.zip *
    
    - name: ⬆️ Subir artefacto a Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ucred-dotnet-ui/Calculadora-v${{ needs.create-release.outputs.version }}-osx-arm64.zip
        asset_name: Calculadora-v${{ needs.create-release.outputs.version }}-osx-arm64.zip
        asset_content_type: application/zip

  build-linux:
    name: 🐧 Compilar para Linux
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
    
    - name: ⚙️ Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restaurar dependencias
      run: dotnet restore CalculadoraDemo.sln
    
    - name: 🔨 Publicar aplicación (linux-x64)
      run: |
        dotnet publish src/Calculadora/Calculadora.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=false \
          -o publish/linux-x64
    
    - name: 📦 Empaquetar binarios
      run: |
        cd publish/linux-x64
        chmod +x Calculadora
        zip -r ../../Calculadora-v${{ needs.create-release.outputs.version }}-linux-x64.zip *
    
    - name: ⬆️ Subir artefacto a Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ucred-dotnet-ui/Calculadora-v${{ needs.create-release.outputs.version }}-linux-x64.zip
        asset_name: Calculadora-v${{ needs.create-release.outputs.version }}-linux-x64.zip
        asset_content_type: application/zip
